services:
  postgres:
    image: postgres:16-alpine
    container_name: phone-validator-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-phone_validator}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-phone_validator}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: phone-validator-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/phone_validator}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-20}
      APP_ENV: ${APP_ENV:-development}
      WEBHOOK_TOKEN: ${WEBHOOK_TOKEN:-}
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
      NGINX_PORT: ${NGINX_PORT:-8005}
      # Path inside container; leave empty to use repo-root mock.json next to the app package.
      MOCK_JSON_PATH: ${MOCK_JSON_PATH:-}
    volumes:
      - ./mock.json:/app/mock.json:ro
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: phone-validator-frontend
    environment:
      VITE_API_BASE_URL: ""
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: phone-validator-nginx
    ports:
      - "${NGINX_PORT:-8005}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
